<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כרטיסיית חזרה — מבוא לפסיכולוגיה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Assistant:wght@400;500;600;700&family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f1e7;
    --paper-2:#fffdf8;
    --ink:#24211c;
    --ink-soft:#5d564b;
    --line:#e3dac8;
    --primary:#2f6d63;
    --primary-dark:#1f4f47;
    --primary-soft:#e4efe9;
    --accent:#c2562f;
    --accent-soft:#f7e4da;
    --hl:#ffe9a3;
    --hl-edge:#f4cf63;
    --similar-bg:#e8f1e6;
    --similar-edge:#3f7d4f;
    --different-bg:#f8e7df;
    --different-edge:#c2562f;
    --shadow:0 8px 30px rgba(40,34,22,.10);
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:'Assistant',sans-serif;
    background:
      radial-gradient(1200px 600px at 100% -10%, #efe7d4 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 110%, #ece2cd 0%, transparent 55%),
      var(--paper);
    color:var(--ink);
    line-height:1.75;
    font-size:17px;
  }

  /* ---------- Page title (scrolls away, not sticky) ---------- */
  .page-title{
    max-width:1180px; margin:0 auto; padding:30px 22px 6px;
    display:flex; align-items:center; gap:13px;
  }
  .page-title .mark{
    width:44px;height:44px;border-radius:12px;flex:none;
    background:linear-gradient(145deg,var(--primary),var(--primary-dark));
    color:#fff;display:grid;place-items:center;
    font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:23px;
    box-shadow:var(--shadow);
  }
  .page-title h1{font-family:'Frank Ruhl Libre',serif;font-size:22px;margin:0;font-weight:900;}
  .page-title small{display:block;color:var(--ink-soft);font-weight:600;font-size:13px;}

  /* ---------- Floating search (loupe) ---------- */
  .fab-search{
    position:fixed; top:16px; right:16px; z-index:60;
    width:40px; height:40px; border-radius:50%;
    border:1.5px solid var(--line);
    background:var(--paper-2); color:var(--primary-dark);
    display:grid; place-items:center; cursor:pointer;
    box-shadow:var(--shadow); transition:.18s;
  }
  .fab-search:hover{background:var(--primary);color:#fff;border-color:var(--primary);transform:scale(1.06);}
  .fab-search svg{width:18px;height:18px;}

  .search-panel{
    position:fixed; top:62px; right:16px; z-index:60;
    width:min(360px, calc(100vw - 36px));
    background:var(--paper-2); border:1.5px solid var(--line);
    border-radius:16px; box-shadow:0 16px 44px rgba(40,34,22,.20);
    padding:14px; opacity:0; transform:translateY(-10px) scale(.98);
    pointer-events:none; transition:.2s ease;
  }
  .search-panel.open{opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}
  .search-row{position:relative;}
  .search-row svg{
    position:absolute; inset-inline-start:14px; top:50%; transform:translateY(-50%);
    width:18px;height:18px;color:var(--ink-soft); pointer-events:none;
  }
  #search{
    width:100%; padding:12px 44px 12px 40px;
    border:1.5px solid var(--line); border-radius:11px;
    background:var(--paper); color:var(--ink);
    font-family:inherit; font-size:15.5px; font-weight:600;
    transition:border-color .15s, box-shadow .15s;
  }
  #search:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft);}
  .clear-search{
    position:absolute; inset-inline-end:10px; top:50%; transform:translateY(-50%);
    width:24px;height:24px;border:none;border-radius:50%;cursor:pointer;
    background:var(--line);color:var(--ink-soft);display:none;place-items:center;font-size:15px;line-height:1;
  }
  .clear-search.show{display:grid;}
  .panel-hint{margin:9px 4px 2px;font-size:11.5px;color:var(--ink-soft);}
  .panel-hint kbd{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-family:inherit;font-weight:700;}

  /* ---------- Layout ---------- */
  .layout{max-width:1180px; margin:0 auto; padding:28px 22px 80px;
    display:grid; grid-template-columns:260px 1fr; gap:34px; align-items:start;}
  nav.toc{position:sticky; top:24px;}
  .toc-title{font-size:12.5px; font-weight:800; letter-spacing:1px;
    color:var(--ink-soft); text-transform:uppercase; margin:0 4px 12px;}
  .toc ul{list-style:none;margin:0;padding:0;}
  .toc .toc-chap{
    font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:15px;
    color:var(--primary-dark); margin:14px 4px 6px; padding-bottom:6px;
    border-bottom:1px dashed var(--line);
  }
  .toc a{
    display:block; text-decoration:none; color:var(--ink-soft);
    font-weight:600; font-size:14.5px; padding:7px 12px; border-radius:9px;
    border-inline-start:3px solid transparent; transition:.15s; cursor:pointer;
  }
  .toc a:hover{background:var(--paper-2);color:var(--ink);}
  .toc a.active{background:var(--primary-soft);color:var(--primary-dark);
    border-inline-start-color:var(--primary);}

  /* ---------- Cards ---------- */
  .stream{display:flex;flex-direction:column;gap:26px;min-width:0;}
  .chap-head{display:flex;align-items:center;gap:14px;margin:6px 0 2px;}
  .chap-head .num{
    font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:15px;
    background:var(--accent);color:#fff;border-radius:9px;padding:5px 12px;flex:none;
  }
  .chap-head h2{font-family:'Frank Ruhl Libre',serif;font-size:26px;margin:0;font-weight:900;}

  .card{
    background:var(--paper-2); border:1px solid var(--line);
    border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
    scroll-margin-top:100px;
  }
  .card-head{
    display:flex;align-items:center;gap:14px;cursor:pointer;
    padding:18px 22px; user-select:none;
    background:linear-gradient(180deg, #fffefb, #fbf6ec);
    border-bottom:1px solid var(--line);
  }
  .card-head .qtag{
    font-family:'Heebo',sans-serif;font-weight:800;font-size:12.5px;letter-spacing:.5px;
    color:#fff;background:linear-gradient(145deg,var(--primary),var(--primary-dark));
    padding:6px 12px;border-radius:999px;flex:none;
  }
  .card-head h3{font-family:'Frank Ruhl Libre',serif;font-size:21px;margin:0;font-weight:700;flex:1;}
  .chev{width:22px;height:22px;color:var(--ink-soft);transition:transform .25s;flex:none;}
  .card.collapsed .chev{transform:rotate(-90deg);}
  .card-body{padding:22px 24px 26px;}
  .card.collapsed .card-body{display:none;}

  .card-body p{margin:0 0 14px;}
  .lead{color:var(--ink-soft);font-weight:600;}
  .qstmt{background:#eef4f3;border:1px solid var(--line);border-inline-start:4px solid var(--primary);
    border-radius:11px;padding:13px 16px;margin:0 0 18px;
    font-family:'Frank Ruhl Libre',serif;font-size:17.5px;line-height:1.65;color:var(--ink);font-weight:500;}
  .qstmt::before{content:"השאלה";display:block;font-family:'Heebo',sans-serif;font-weight:800;
    font-size:11px;letter-spacing:1px;color:var(--primary-dark);margin-bottom:5px;}

  /* definition highlight */
  .def{
    position:relative; margin:6px 0 20px; padding:18px 20px 18px 22px;
    background:var(--paper);
    border:1px solid var(--hl-edge);
    border-inline-start:6px solid var(--hl-edge);
    border-radius:12px;
  }
  .def .def-label{
    display:inline-block;font-family:'Heebo',sans-serif;font-weight:800;font-size:11.5px;
    letter-spacing:1px;color:#8a6b12;background:var(--hl);
    padding:3px 10px;border-radius:6px;margin-bottom:8px;
  }
  .def .def-text{font-family:'Frank Ruhl Libre',serif;font-size:19.5px;font-weight:700;line-height:1.6;}
  mark{background:linear-gradient(120deg, var(--hl) 0%, #fff0bf 100%);
    padding:.05em .25em;border-radius:4px;color:inherit;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
  mark.key{background:linear-gradient(120deg, #bfe6d6 0%, #dcf2e8 100%);color:#10463a;}

  /* key terms grid */
  .terms{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:8px 0 6px;}
  .term{
    background:var(--paper);border:1px solid var(--line);border-radius:13px;
    padding:15px 16px;position:relative;transition:.18s;
  }
  .term:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow);}
  .term .t-name{
    font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:18px;color:var(--primary-dark);
    margin-bottom:5px;display:flex;align-items:center;gap:8px;
  }
  .term .t-name::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none;}
  .term .t-desc{font-size:15px;color:var(--ink);}

  .subtitle{font-family:'Heebo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.5px;
    color:var(--ink-soft);margin:22px 0 10px;text-transform:uppercase;}

  /* compare rows */
  .compare{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
  .crow{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--paper);}
  .crow .cname{
    font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:17px;
    padding:11px 16px;background:#fbf6ec;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:9px;
  }
  .crow .cname .badge-add{font-family:'Assistant';font-size:11px;font-weight:700;color:var(--accent);
    background:var(--accent-soft);padding:2px 8px;border-radius:6px;}
  .cgrid{display:grid;grid-template-columns:1fr 1fr;}
  .ccell{padding:13px 16px;font-size:15px;}
  .ccell.sim{background:var(--similar-bg);border-inline-end:1px solid var(--line);}
  .ccell.dif{background:var(--different-bg);}
  .ctag{display:inline-block;font-family:'Heebo',sans-serif;font-weight:800;font-size:11px;letter-spacing:.5px;
    padding:2px 9px;border-radius:6px;margin-bottom:6px;}
  .ctag.s{color:#2c5b38;background:#cfe3cc;}
  .ctag.d{color:#8c3a1c;background:#f0cdbd;}

  .note{display:flex;gap:11px;align-items:flex-start;margin-top:16px;padding:14px 16px;
    background:var(--primary-soft);border-radius:12px;font-size:15px;color:var(--primary-dark);}
  .note svg{width:20px;height:20px;flex:none;margin-top:2px;}
  .note b{font-weight:800;}

  .source{display:inline-flex;align-items:center;gap:5px;font-family:'Heebo';font-weight:700;
    font-size:11.5px;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);
    border-radius:7px;padding:3px 9px;margin-inline-start:8px;vertical-align:middle;
    cursor:pointer;transition:.15s;}
  .source::before{content:"📖";font-size:11px;}
  .source:hover{border-color:var(--primary);color:var(--primary-dark);background:var(--primary-soft);}
  .source.repeat{color:var(--ink-soft);background:transparent;border-style:dashed;opacity:.85;}
  .source.repeat::before{content:"↑";font-size:13px;font-weight:900;}
  .source.repeat:hover{border-color:var(--ink-soft);color:var(--ink);background:var(--paper);}
  .src-repeat-note{font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;color:var(--primary-dark);
    background:var(--primary-soft);border-radius:9px;padding:8px 12px;margin-bottom:14px;}

  /* ---------- Source modal (citation exacte) ---------- */
  .src-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
    background:rgba(30,25,18,.55);backdrop-filter:blur(3px);padding:22px;}
  .src-modal.open{display:flex;animation:fadeIn .15s ease;}
  .src-box{background:var(--paper-2);border:1px solid var(--line);border-radius:18px;
    max-width:640px;width:100%;max-height:82vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.32);
    animation:popIn .18s ease;}
  .src-head{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:15px 20px;background:linear-gradient(180deg,#fffefb,#fbf6ec);
    border-bottom:1px solid var(--line);}
  .src-page{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:18px;color:var(--primary-dark);
    display:flex;align-items:center;gap:8px;}
  .src-page::before{content:"📖";}
  .src-close{width:34px;height:34px;border:1px solid var(--line);border-radius:50%;cursor:pointer;
    font-size:22px;line-height:1;background:var(--paper);color:var(--ink-soft);flex:none;transition:.15s;}
  .src-close:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .src-quote{padding:20px 24px;}
  .src-quote p{font-family:'Frank Ruhl Libre',serif;font-size:18px;line-height:1.9;margin:0 0 16px;
    padding-inline-start:14px;border-inline-start:3px solid var(--hl-edge);}
  .src-quote p:last-child{margin-bottom:0;}
  .src-foot{padding:11px 20px 18px;color:var(--ink-soft);font-size:12px;text-align:center;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes popIn{from{opacity:0;transform:translateY(8px) scale(.985)}to{opacity:1;transform:none}}

  .no-results{display:none;text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .no-results.show{display:block;}
  .no-results .big{font-family:'Frank Ruhl Libre',serif;font-size:24px;font-weight:700;color:var(--ink);}

  footer{max-width:1180px;margin:0 auto;padding:0 22px 50px;color:var(--ink-soft);
    font-size:13px;text-align:center;}
  footer span{color:var(--primary-dark);font-weight:700;}

  .hidden{display:none !important;}

  /* ---------- Responsive ---------- */
  @media(max-width:880px){
    .layout{grid-template-columns:1fr;gap:18px;}
    nav.toc{position:static;order:-1;background:var(--paper-2);border:1px solid var(--line);
      border-radius:14px;padding:14px 16px;}
    .toc{max-height:none;}
    .terms{grid-template-columns:1fr;}
    .search-hint{display:none;}
  }
  @media(max-width:540px){
    body{font-size:16px;}
    .cgrid{grid-template-columns:1fr;}
    .ccell.sim{border-inline-end:none;border-bottom:1px solid var(--line);}
    .chap-head h2{font-size:22px;}
    .brand small{display:none;}
  }
  @media print{
    .fab-search,.search-panel,nav.toc,.chev{display:none !important;}
    .layout{grid-template-columns:1fr;}
    .card{box-shadow:none;break-inside:avoid;}
    .card.collapsed .card-body{display:block !important;}
    body{background:#fff;}
  }
</style>
</head>
<body>

<button class="fab-search" id="fabSearch" aria-label="חיפוש" title="חיפוש (/)">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
</button>

<div class="search-panel" id="searchPanel">
  <div class="search-row">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input id="search" type="text" placeholder="חיפוש נושא, מושג או הגדרה…" autocomplete="off">
    <button class="clear-search" id="clearSearch" aria-label="ניקוי">×</button>
  </div>
  <div class="panel-hint">לחיצה על <kbd>/</kbd> פותחת חיפוש · <kbd>Esc</kbd> לסגירה</div>
</div>

<div class="page-title">
  <div class="mark">פ</div>
  <div>
    <h1>כרטיסיית חזרה</h1>
    <small>מבוא לפסיכולוגיה · 10136</small>
  </div>
</div>

<div class="layout">
  <nav class="toc">
    <p class="toc-title">ניווט מהיר</p>
    <ul id="toc-list"></ul>
  </nav>

  <main class="stream" id="stream"></main>

  <div class="no-results" id="noResults">
    <div class="big">לא נמצאו תוצאות</div>
    <p>נסו מילת חיפוש אחרת.</p>
  </div>
</div>

<footer>
  כל התשובות מבוססות על <span>ספר הקורס, פרק 1 (עמ' 5–12)</span> · עודכן לאחרונה: <span id="updated"></span>
</footer>

<div class="src-modal" id="srcModal" role="dialog" aria-modal="true">
  <div class="src-box" id="srcBox">
    <div class="src-head">
      <span class="src-page" id="srcPage"></span>
      <button class="src-close" id="srcClose" aria-label="סגירה">×</button>
    </div>
    <div class="src-quote" id="srcBody"></div>
    <div class="src-foot">הציטוט המדויק מתוך ספר הקורס · לחצו על × או מחוץ לחלון לסגירה</div>
  </div>
</div>

<script>
/* Charge data.js avec anti-cache, puis lance l'app SEULEMENT quand les données sont prêtes */
function bootData(cb){
  var s = document.createElement('script');
  s.src = 'data.js?t=' + Date.now();
  s.onload = cb;
  s.onerror = function(){
    var el = document.getElementById('stream');
    if(el) el.innerHTML = '<p style="padding:40px;text-align:center;color:#5d564b">שגיאה בטעינת התוכן (data.js). בדקו את החיבור ונסו לרענן.</p>';
  };
  document.head.appendChild(s);
}
</script>
<script>
function initApp(){

/* ---------- Rendering ---------- */
const stream = document.getElementById('stream');
const tocList = document.getElementById('toc-list');

const seenSources = new Set();
function srcBadge(key){
  const s = SOURCES[key];
  const label = s ? s.page : key;
  const repeat = seenSources.has(key);
  if(!repeat) seenSources.add(key);
  return `<button type="button" class="source${repeat?' repeat':''}" data-src="${key}"${repeat?' title="אותו מקור שכבר הופיע למעלה"':''}>${label}</button>`;
}
function inline(t){
  return (t||"")
    .replace(/<m>/g,'<mark>').replace(/<\/m>/g,'</mark>')
    .replace(/<k>/g,'<mark class="key">').replace(/<\/k>/g,'</mark>')
    .replace(/\[\[([A-Za-z0-9_]+)\]\]/g,(m,k)=>srcBadge(k));
}

function renderBlock(b){
  if(b.type==="p")        return `<p class="${b.lead?'lead':''}">${inline(b.text)}</p>`;
  if(b.type==="q")        return `<div class="qstmt">${inline(b.text)}</div>`;
  if(b.type==="subtitle") return `<div class="subtitle">${inline(b.text)}</div>`;
  if(b.type==="def")      return `<div class="def"><span class="def-label">הגדרה</span>
      <div class="def-text">${inline(b.text)}${b.src?srcBadge(b.src):''}</div></div>`;
  if(b.type==="terms")    return `<div class="terms">${b.items.map(it=>`
      <div class="term"><div class="t-name">${it.name}</div>
      <div class="t-desc">${inline(it.desc)}${it.src?srcBadge(it.src):''}</div></div>`).join('')}</div>`;
  if(b.type==="compare")  return `<div class="compare">${b.rows.map(r=>`
      <div class="crow"><div class="cname">${r.name}${r.add?'<span class="badge-add">תוספת</span>':''}</div>
      <div class="cgrid">
        <div class="ccell sim"><span class="ctag s">דומה</span>${inline(r.similar)}</div>
        <div class="ccell dif"><span class="ctag d">שונה</span>${inline(r.different)}</div>
      </div></div>`).join('')}</div>`;
  if(b.type==="note")     return `<div class="note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
      <div>${inline(b.text)}</div></div>`;
  return "";
}

function searchText(entry){
  let s = entry.tag + " " + entry.title + " ";
  entry.blocks.forEach(b=>{
    if(b.text) s += b.text + " ";
    if(b.items) b.items.forEach(i=> s += i.name+" "+i.desc+" ");
    if(b.rows)  b.rows.forEach(r=> s += r.name+" "+r.similar+" "+r.different+" ");
  });
  return s.replace(/\[\[[^\]]+\]\]/g,' ').replace(/<\/?[^>]+>/g,'').toLowerCase();
}

DATA.chapters.forEach(ch=>{
  const head = document.createElement('div');
  head.className = 'chap-head';
  head.innerHTML = `<span class="num">${ch.num}</span><h2>${ch.title}</h2>`;
  head.dataset.chap = ch.id;
  stream.appendChild(head);

  const tChap = document.createElement('li');
  tChap.className = 'toc-chap';
  tChap.textContent = `${ch.num} · ${ch.title}`;
  tocList.appendChild(tChap);

  ch.entries.forEach(en=>{
    const card = document.createElement('article');
    card.className = 'card';
    card.id = en.id;
    card.dataset.search = searchText(en);
    card.dataset.chap = ch.id;
    card.innerHTML = `
      <div class="card-head" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="qtag">${en.tag}</span>
        <h3>${en.title}</h3>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="card-body">${en.blocks.map(renderBlock).join('')}</div>`;
    stream.appendChild(card);

    const li = document.createElement('li');
    li.innerHTML = `<a role="button" tabindex="0" data-target="${en.id}">${en.tag} — ${en.title}</a>`;
    tocList.appendChild(li);
  });
});

/* ---------- TOC navigation (no links, pure scroll) ---------- */
function goTo(id){
  const card = document.getElementById(id);
  if(!card) return;
  card.classList.remove('collapsed');   // ouvre la carte si elle était repliée
  card.classList.remove('hidden');
  card.scrollIntoView({behavior:'smooth', block:'start'});
}
tocList.addEventListener('click', e=>{
  const a = e.target.closest('a[data-target]');
  if(!a) return;
  e.preventDefault();
  goTo(a.dataset.target);
});
tocList.addEventListener('keydown', e=>{
  if((e.key==='Enter'||e.key===' ') && e.target.dataset && e.target.dataset.target){
    e.preventDefault();
    goTo(e.target.dataset.target);
  }
});

/* ---------- Search ---------- */
const search = document.getElementById('search');
const noResults = document.getElementById('noResults');
const cards = [...document.querySelectorAll('.card')];
const chapHeads = [...document.querySelectorAll('.chap-head')];
const fab = document.getElementById('fabSearch');
const panel = document.getElementById('searchPanel');
const clearBtn = document.getElementById('clearSearch');

function openSearch(){ panel.classList.add('open'); setTimeout(()=>search.focus(),60); }
function closeSearch(){ panel.classList.remove('open'); }
function toggleSearch(){ panel.classList.contains('open') ? closeSearch() : openSearch(); }

fab.addEventListener('click', e=>{ e.stopPropagation(); toggleSearch(); });
clearBtn.addEventListener('click', e=>{ e.stopPropagation(); search.value=''; runFilter(); search.focus(); });
panel.addEventListener('click', e=>{ e.stopPropagation(); }); /* un tap dans le panneau ne le ferme pas */

/* fermer en cliquant à l'extérieur (les clics fab/panneau ne remontent pas jusqu'ici) */
document.addEventListener('click', ()=>{ if(panel.classList.contains('open')) closeSearch(); });

function runFilter(){
  const q = search.value.trim().toLowerCase();
  clearBtn.classList.toggle('show', q.length>0);
  let visible = 0;
  cards.forEach(c=>{
    const match = !q || c.dataset.search.includes(q);
    c.classList.toggle('hidden', !match);
    if(match) visible++;
  });
  chapHeads.forEach(h=>{
    const any = cards.some(c=>c.dataset.chap===h.dataset.chap && !c.classList.contains('hidden'));
    h.classList.toggle('hidden', !any);
  });
  document.querySelectorAll('#toc-list a').forEach(a=>{
    const c = document.getElementById(a.dataset.target);
    a.parentElement.classList.toggle('hidden', c.classList.contains('hidden'));
  });
  noResults.classList.toggle('show', visible===0);
}
search.addEventListener('input', runFilter);

/* ---------- Source modal (citation exacte du livre) ---------- */
const srcModal = document.getElementById('srcModal');
const srcPage  = document.getElementById('srcPage');
const srcBody  = document.getElementById('srcBody');

function openSrc(key, isRepeat){
  const s = SOURCES[key];
  if(!s || !s.paras) return;
  srcPage.textContent = s.page;
  srcBody.innerHTML = (isRepeat ? `<div class="src-repeat-note">↑ אותו מקור שכבר הופיע למעלה</div>` : '')
    + s.paras.map(p=>`<p>${p}</p>`).join('');
  srcModal.classList.add('open');
}
function closeSrc(){ srcModal.classList.remove('open'); }

/* clic sur une pastille 📖 (או ↑) → ouvre la source */
document.addEventListener('click', e=>{
  const badge = e.target.closest('.source[data-src]');
  if(badge){ e.stopPropagation(); openSrc(badge.dataset.src, badge.classList.contains('repeat')); }
});
/* fermeture : × , clic sur le fond, ou Échap */
document.getElementById('srcClose').addEventListener('click', closeSrc);
srcModal.addEventListener('click', e=>{ if(e.target===srcModal) closeSrc(); });

document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement!==search){ e.preventDefault(); openSearch(); }
  if(e.key==='Escape'){ closeSrc(); search.value=''; runFilter(); closeSearch(); search.blur(); }
});

/* ---------- Active link on scroll ---------- */
const links = [...document.querySelectorAll('#toc-list a')];
const obs = new IntersectionObserver(es=>{
  es.forEach(en=>{
    if(en.isIntersecting){
      links.forEach(l=>l.classList.toggle('active', l.dataset.target===en.target.id));
    }
  });
},{rootMargin:'-20% 0px -70% 0px'});
cards.forEach(c=>obs.observe(c));

document.getElementById('updated').textContent =
  new Date().toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});

}
/* lance tout : charge data.js (anti-cache) puis affiche */
bootData(initApp);
</script>
</body>
